# ============================================================
# FPL Ponte — Orquestração local / staging
#
# Sobe a stack completa que reflete a infraestrutura-alvo do CEGER:
#   - PostgreSQL 16   (base de dados relacional)
#   - Redis 7         (cache, sessões, rate-limit, filas)
#   - MinIO           (object storage S3-compatível — anexos)
#   - app             (backend Node.js + frontend servido)
#   - adminer         (consola SQL — apenas perfil "tools")
#
# Uso:
#   cp .env.example .env      # ajustar credenciais
#   docker compose up -d      # sobe postgres + redis + minio + app
#   docker compose --profile tools up -d   # + adminer
#
# Em produção no CEGER, os serviços de dados (Postgres, Redis,
# MinIO) podem ser geridos separadamente; este compose serve
# dev/staging e como referência de configuração.
# ============================================================

name: fpl-ponte

services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fpl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fpl}
      POSTGRES_DB: ${POSTGRES_DB:-fpl}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fpl} -d ${POSTGRES_DB:-fpl}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fpl-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fpl-minio-secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # consola web
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cria o bucket de anexos no arranque (idempotente)
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-fpl-minio} ${MINIO_ROOT_PASSWORD:-fpl-minio-secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-fpl-anexos} &&
      mc anonymous set none local/${S3_BUCKET:-fpl-anexos} &&
      echo 'Bucket pronto.'
      "

  app:
    build:
      context: ./app
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3717
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3717}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      DATABASE_URL: postgres://${POSTGRES_USER:-fpl}:${POSTGRES_PASSWORD:-fpl}@postgres:5432/${POSTGRES_DB:-fpl}
      REDIS_URL: redis://redis:6379
      REDIS_OPTIONAL: "false"
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-fpl-anexos}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-fpl-minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-fpl-minio-secret}
      S3_FORCE_PATH_STYLE: "true"
      JWT_SECRET: ${JWT_SECRET:?defina JWT_SECRET no .env}
      CL_WEBHOOK_KEY: ${CL_WEBHOOK_KEY:?defina CL_WEBHOOK_KEY no .env}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-outbox}
      RTRI_MODE: ${RTRI_MODE:-mock}
      CONSULTA_LEX_MODE: ${CONSULTA_LEX_MODE:-manual}
      LOG_FORMAT: json
    ports:
      - "3717:3717"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3717/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Consola SQL — apenas com: docker compose --profile tools up
  adminer:
    image: adminer:latest
    restart: unless-stopped
    profiles: ["tools"]
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  pg_data:
  redis_data:
  minio_data:
