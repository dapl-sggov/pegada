name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Verificação de sintaxe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: node --check (backend)
        working-directory: app/backend
        run: |
          for f in $(find src -name '*.js'); do echo "→ $f"; node --check "$f"; done
      - name: node --check (frontend + demo)
        run: |
          node --check app/frontend/app.js
          node --check demo/demo.js

  test:
    name: Testes de domínio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependências
        working-directory: app/backend
        run: npm install --no-audit --no-fund
      - name: Testes (workflow + comprovativo + fluxo FPL)
        working-directory: app/backend
        run: npm test

  smoke:
    name: Smoke test (boot + API + comprovativo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependências
        working-directory: app/backend
        run: npm install --no-audit --no-fund
      - name: Migrar + seed (SQLite)
        working-directory: app/backend
        run: |
          node src/migrate.js
          node src/seed.js
      - name: Arrancar servidor
        working-directory: app/backend
        run: |
          node src/server.js > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 20); do
            curl -sf http://localhost:3717/health > /dev/null && break
            sleep 0.5
          done
      - name: Health + JWKS
        run: |
          curl -sf http://localhost:3717/health | grep -q '"ok":true'
          curl -sf http://localhost:3717/api/.well-known/fpl-jwks.json | grep -q 'Ed25519'
          echo "✓ health + JWKS"
      - name: Fluxo de login + criação + M0 + comprovativo
        run: |
          curl -s -c /tmp/ck.txt http://localhost:3717/api/auth/csrf > /dev/null
          CSRF=$(grep fpl_csrf /tmp/ck.txt | awk '{print $7}')
          curl -s -b /tmp/ck.txt -c /tmp/ck.txt -X POST -H "Content-Type: application/json" -H "x-csrf-token: $CSRF" \
            -d '{"email":"maria.silva@gov.pt","password":"demo1234"}' http://localhost:3717/api/auth/login | grep -q maria.silva
          FID=$(curl -s -b /tmp/ck.txt -X POST -H "Content-Type: application/json" -H "x-csrf-token: $CSRF" \
            -d '{"tipo_diploma":"DL","titulo":"FPL de smoke test do CI","gabinete_id":"mae"}' \
            http://localhost:3717/api/fpl | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id))")
          # M0 sem Bloco B → 422
          ST=$(curl -s -o /dev/null -w "%{http_code}" -b /tmp/ck.txt -X POST -H "Content-Type: application/json" -H "x-csrf-token: $CSRF" \
            -d '{}' http://localhost:3717/api/fpl/$FID/marcos/M0/validar)
          test "$ST" = "422" || (echo "Esperado 422, obtido $ST" && exit 1)
          # preencher Bloco B + validar M0 → emite comprovativo
          curl -s -o /dev/null -b /tmp/ck.txt -X PATCH -H "Content-Type: application/json" -H "x-csrf-token: $CSRF" \
            -d '{"tipo_origem":"OUTRA","sintese_problema":"'"$(printf 'a%.0s' {1..220})"'"}' \
            http://localhost:3717/api/fpl/$FID/bloco-b
          curl -s -b /tmp/ck.txt -X POST -H "Content-Type: application/json" -H "x-csrf-token: $CSRF" \
            -d '{}' http://localhost:3717/api/fpl/$FID/marcos/M0/validar | grep -q '"comprovativo"'
          echo "✓ workflow bloqueante + emissão de comprovativo"
      - name: Parar servidor
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true
