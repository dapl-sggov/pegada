name: Deploy mock to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mock/**'
      - 'demo/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site (mock + landing page)
        run: |
          mkdir -p _site
          cp -r mock _site/mock
          cp -r demo _site/demo
          cp -r docs _site/docs
          cp README.md _site/README.md
          # A página de apresentação principal é o `mock/index.html`.
          # Replicamos como raiz para que `https://.../pegada/` aponte
          # diretamente para a apresentação institucional, e mantemos
          # também `/mock/` por compatibilidade com links externos.
          cp mock/index.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
